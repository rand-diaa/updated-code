<!DOCTYPE html>
{% load static %}
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">

  <style media="screen">
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #eff6ff 0%, #ecfeff 100%);
      min-height: 100vh;
    }

    .role-wrapper {
      min-height: calc(100vh - 150px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 16px 40px;
    }

    .role-card {
      width: 100%;
      max-width: 760px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 14px 40px rgba(14, 116, 144, 0.14);
      padding: 42px 32px;
      text-align: center;
      border: 1px solid #e5e7eb;
    }

    .role-icon {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #cffafe;
      color: #0e7490;
      font-size: 30px;
    }

    .role-title {
      font-size: 2.1rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 8px;
    }

    .role-subtitle {
      color: #4b5563;
      font-size: 1.05rem;
      margin-bottom: 24px;
    }

    .role-note {
      color: #6b7280;
      margin-bottom: 26px;
    }

    .role-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .role-btn {
      border: none;
      border-radius: 999px;
      padding: 12px 24px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .role-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
    }

    .btn-create {
      background: #e5e7eb;
      color: #1f2937;
    }

    .btn-login {
      background: linear-gradient(135deg, #0891b2 0%, #0e7490 100%);
      color: #ffffff;
    }

    @media (max-width: 576px) {
      .role-card {
        padding: 30px 20px;
      }

      .role-title {
        font-size: 1.7rem;
      }
    }

  </style>

</head>

<body>

  {% include "exam/navbar.html" %}
  <div class="role-wrapper">
    <div class="role-card">
      <div class="role-icon">
        <i class="fa fa-graduation-cap" aria-hidden="true"></i>
      </div>
      <h1 class="role-title">Hello Student</h1>
      <p class="role-subtitle">Welcome to Al-Nahrain Online Exam System</p>
      <p class="role-note">Create your account to start exams, or login to continue your progress.</p>
      <div class="role-actions">
        <a class="role-btn btn-create" href="studentsignup" role="button">Create Your Account</a>
        <a class="role-btn btn-login" href="studentlogin" role="button">Login Now</a>
      </div>
    </div>
  </div>
 
  {% include "exam/footer.html" %}
</body>

</html>
