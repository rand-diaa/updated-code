<!DOCTYPE html>
{% load static %}
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al-Nahrain Online Exam System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 45%, #0ea5e9 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 50px;
      position: relative;
    }

    .hero-inner {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .hero-content {
      text-align: center;
      color: white;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero-title {
      font-size: 4rem;
      font-weight: 800;
      margin-bottom: 20px;
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
      letter-spacing: -1px;
    }

    .hero-subtitle {
      font-size: 1.5rem;
      margin-bottom: 15px;
      opacity: 0.95;
      font-weight: 300;
    }

    .hero-description {
      font-size: 1.1rem;
      margin-bottom: 50px;
      opacity: 0.9;
    }

    .button-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 40px;
    }

    .action-btn {
      padding: 20px 45px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 50px;
      border: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      position: relative;
      overflow: hidden;
    }

    .action-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .action-btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .action-btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }

    .action-btn:active {
      transform: translateY(-2px) scale(1.02);
    }

    .btn-student {
      background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
      color: white;
    }

    .btn-teacher {
      background: linear-gradient(135deg, #28a745 0%, #218838 100%);
      color: white;
    }

    .btn-admin {
      background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
      color: white;
    }

    .action-btn i {
      font-size: 22px;
      position: relative;
      z-index: 1;
    }

    .action-btn span {
      position: relative;
      z-index: 1;
    }

    @media (max-width: 768px) {
      .hero-title {
        font-size: 2.5rem;
      }

      .hero-subtitle {
        font-size: 1.2rem;
      }

      .hero-description {
        font-size: 1rem;
      }

      .action-btn {
        padding: 18px 35px;
        font-size: 16px;
        width: 100%;
        max-width: 320px;
      }

      .button-container {
        flex-direction: column;
        align-items: center;
      }
    }

    @media (max-width: 480px) {
      .hero-title {
        font-size: 2rem;
      }

      .action-btn {
        padding: 16px 30px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  {% include "exam/navbar.html" %}
  
  <section class="hero-section">
    <div class="hero-inner">
      <div class="hero-content">
        <h1 class="hero-title">Al-Nahrain Online Exam System</h1>
        <p class="hero-subtitle">Manage your courses and examinations online!</p>
        <p class="hero-description">Choose your role to get started</p>
        
        <div class="button-container">
          <a href="/student/studentsignup" class="action-btn btn-student">
            <i class="fa fa-graduation-cap" aria-hidden="true"></i>
            <span>Sign Up as Student</span>
          </a>
          <a href="/teacher/teachersignup" class="action-btn btn-teacher">
            <i class="fa fa-black-tie" aria-hidden="true"></i>
            <span>Sign Up as Teacher</span>
          </a>
          <a href="/adminclick" class="action-btn btn-admin">
            <i class="fa fa-user-secret" aria-hidden="true"></i>
            <span>Admin Login</span>
          </a>
        </div>
      </div>
    </div>
  </section>
  
  {% include "exam/footer.html" %}
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
